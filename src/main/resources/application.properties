spring.application.name=spring-security-jwt-crud

spring.datasource.url=${MYSQL_URL:jdbc:mysql://localhost:3306/spring_securitydb?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${MYSQL_USERNAME:root}
spring.datasource.password=${MYSQL_PASSWORD:your_mysql_password}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT HS256 secret — MUST override JWT_SECRET in production (ASCII secret ≥ ~43 chars / bytes varies).
app.jwt.secret=${JWT_SECRET:aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
